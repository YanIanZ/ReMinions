file_version: 6
settings:
  # Enables or disables debug messages in console.
  # When true, the plugin will print extra logs (useful for developers or troubleshooting).
  debug_enabled: false

  # Allows minions to keep working while the player is offline.
  # If true → minions continue producing items when the owner disconnects.
  # If false → minions pause when the player leaves the server.
  minions_offline_mode: true
  minions_offline_time_limit: 2 # In days

  # If enabled, only players with a specific permission can have minions working while offline.
  # (Only applies if "minions_offline_mode" is true)
  # Permission: reminions.offline
  required_permission_offline_mode: false

  # Sets the default maximum number of minions each player can have.
  # Players can increase this through upgrades, progress, or permissions.
  default_max_minions: 5

  # If true, players gain experience when a minion *produces* an item automatically.
  products_add_exp_produce: false

  # If true, players gain experience when they *manually collect* items from a minion.
  products_add_exp_take_item: true


  # Controls in which worlds minions are allowed to work.
  world_whitelist:
    # If false, minions can work in any world.
    # If true, only the worlds listed below are allowed.
    enabled: true

    # List of allowed worlds where minions can spawn and operate.
    # You can add or remove worlds depending on your server setup.
    worlds:
      - world
      - world_nether
      - world_the_end

  minions_recipes: true

  superiorskyblock_integration: true
  swm_integration: true

# Worth (sell-price) resolution chain.
# When a minion auto-sells items, ReMinions walks this list of providers in order and uses
# the first one that returns a price for the item. If none match, it falls back to the
# 'price:' field configured on the product in the minion YAML.
#
# Available providers:
#   - shopguiplus      : Reads sell prices from ShopGUI+ (plugin "ShopGUIPlus")
#   - economyshopgui   : Reads sell prices from EconomyShopGUI / EconomyShopGUI-Premium
#   - essentials       : Reads worth.yml via EssentialsX (plugin "Essentials")
#   - yaml             : Sentinel that triggers the per-product 'price' field fallback
#
# Reorder freely to control precedence; remove an entry to disable that source.
worth:
  providers:
    - shopguiplus
    - economyshopgui
    - essentials
    - yaml

# External booster plugins ReMinions queries for per-player speed/production/exp/sell
# multipliers. Multipliers from all providers in the chain are multiplied together.
# Available providers:
#   - prisonboosters   : PrisonBoosters (per-player)
#   - zrips_boosters   : Boosters by Zrips / BG-Software (global or per-player fork)
boosters:
  providers:
    - prisonboosters
    - zrips_boosters

database:
  # Database type: choose one of the following
  # - sqlite → local .db file (default, no external setup required)
  # - mysql  → remote or local SQL server
  # - redis  → cache or memory database (requires Redis server)
  # - mongo  → MongoDB (driver auto-downloaded via plugin.yml libraries block)
  type: sqlite

  # Only used for SQLite mode:
  # This will create a file inside the plugin folder, e.g. "plugins/ReMinions/players.db"
  path: players

  # MySQL settings:
  host: localhost
  port: 3306
  user: root
  password: ""
  database: reminions

  # Redis settings (only used if type = redis)
  redis:
    host: localhost
    port: 6379
    password: ""

  # MongoDB settings (only used if type = mongo)
  # 'uri' takes precedence when set. Otherwise host/port/user/password/database above are used.
  # Example URI: mongodb+srv://user:pass@cluster0.mongodb.net/reminions?retryWrites=true&w=majority
  mongo:
    uri: ""

